<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .crazy-box {
        width: 200px;
        height: 200px;
        background-color: #f0f0f0;
        border-radius: 10px;
        box-shadow: 0 0 10px red, 0 0 20px red, 0 0 30px red, 0 0 40px red,
          0 0 50px red, 0 0 60px red, 0 0 70px red;
      }

      .rightContent {
        position: absolute;
        height: calc(100% - 6%);
        border-radius: 20px;
        background-color: rgba(255, 255, 255, 0.5);
        top: 3%;
        left: calc(4% + 260px);
        right: 2%;
        overflow: auto;
        backdrop-filter: brightness(100%) blur(5px);
        justify-content: center;
        white-space: normal;
        word-break: break-all;
      }
      body {
        /* background-color: #ffffff; */
        background-color: #000000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
        background-image: url(https://www.loliapi.cn/acg/);
      }
    </style>
  </head>
  <body>
    <div class="rightContent">
      <div class="crazy-box"></div>
    </div>
  </body>
</html>
